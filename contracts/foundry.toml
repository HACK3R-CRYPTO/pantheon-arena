[profile.default]
src = "src"
out = "out"
libs = ["lib", "node_modules"]
solc = "0.8.30"
evm_version = "london"
optimizer = true
optimizer_runs = 200
via_ir = true
remappings = [
    "@somnia-chain/reactivity-contracts/=node_modules/@somnia-chain/reactivity-contracts/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/"
]

[rpc_endpoints]
somnia = "https://api.infra.testnet.somnia.network"

[etherscan]
somnia = { key = "placeholder", url = "https://shannon-explorer.somnia.network/api" }
